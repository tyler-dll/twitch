<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dynamic !lurk Creator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="wrap">
    <div class="nav"><a href="../index.html">Back</a><a href="../docs/index.html">Documentation</a></div>
    <h1>Dynamic !lurk Creator</h1>
    <p class="sub">1 to 6 messages. 60 chars max each. Choose platform, then Copy Command.</p>

    <section class="card">
      <div class="topbar">
        <div class="switches">
          <label class="lab">
            Platform
            <select id="platformSel">
              <option value="se">StreamElements</option>
              <option value="nb">Nightbot</option>
            </select>
          </label>

          <label class="lab">
            Mode
            <select id="modeSel">
              <option value="add">Add</option>
              <option value="edit">Edit</option>
            </select>
          </label>
        </div>

        <div class="rightside">
          <div class="count" id="countText">0 of 6</div>
          <div class="actions">
            <button id="addBtn" type="button">Add option</button>
            <button id="resetBtn" type="button" class="ghost">Reset</button>
          </div>
        </div>
      </div>

      <div id="rows" class="rows"></div>

      <details class="vars">
        <summary>Variables Settings</summary>
        <div id="varsBox" class="varsBox"></div>
        <a id="vars_link" href="../docs/index.html">View Variable Documentation</a>
      </details>

      <div class="output">
        <label for="out">Command</label>
        <textarea id="out" rows="3" readonly></textarea>
        <div class="actions">
          <button id="copyBtn" type="button">Copy Command</button>
        </div>
      </div>

      <div class="status">
        <div id="errorText" class="error" aria-live="polite"></div>
      </div>

      <div class="hint">
        Platform switch auto swaps common vars when possible. If something can not be swapped, you will get a Yes or No prompt.
      </div>
    </section>
  </main>

  <template id="varsTplSe">
    <span class="tag">Auto swap</span><br>
    <code>$(sender)</code> to <code>$(user)</code> (Nightbot)<br>
    <code>$(args)</code> to <code>$(query)</code> (Nightbot)<br>
    <code>$(title)</code> to <code>$(twitch $(channel) "{{title}}}")</code><br>
    <code>$(game)</code> to <code>$(twitch $(channel) "{{game}}}")</code><br>
    <code>$(uptime)</code> to <code>$(twitch $(channel) "{{uptimeLength}}}")</code><br><br>

    <span class="tag">Common</span><br>
    <code>$(touser)</code> first word after command, or sender if none<br>
    <code>$(channel)</code> channel name and stats<br>
    <code>$(time)</code> time output<br>
    <code>$(weather location)</code> weather lookup<br><br>

    <span class="tag">StreamElements extras</span><br>
    <code>$(random.pick ...)</code> pick one item<br>
    <code>$(random 1-100)</code> random number<br>
    <code>$(math 2+2)</code> math<br>
    <code>$(repeat n text)</code> repeat text<br>
  </template>
  <template id="varsTplNb">
    <span class="tag">Auto swap</span><br>
    <code>$(user)</code> to <code>$(sender)</code> (StreamElements)<br>
    <code>$(query)</code> to <code>$(args)</code> (StreamElements)<br>
    <code>$(twitch $(channel) "{{title}}}")</code> to <code>$(title)</code><br>
    <code>$(twitch $(channel) "{{game}}}")</code> to <code>$(game)</code><br>
    <code>$(twitch $(channel) "{{uptimeLength}}}")</code> to <code>$(uptime)</code><br><br>

    <span class="tag">Common</span><br>
    <code>$(touser)</code> first word after command, or sender if none<br>
    <code>$(channel)</code> channel name<br>
    <code>$(time)</code> time output<br>
    <code>$(weather location)</code> weather lookup<br><br>

    <span class="tag">Nightbot extras</span><br>
    <code>$(eval ...)</code> run JavaScript<br>
    <code>$(twitch username "template")</code> Twitch info<br>
    <code>$(urlfetch url)</code> fetch a url<br>
  </template>

  <template id="rowTpl">
    <div class="row">
      <input class="msg" type="text" maxlength="60" autocomplete="off" spellcheck="false">
      <div class="meta">
        <span class="chars">0/60</span>
        <button class="del" type="button" title="Delete">Delete</button>
      </div>
    </div>
  </template>

  <script src="script.js"></script>
</body>
</html>
